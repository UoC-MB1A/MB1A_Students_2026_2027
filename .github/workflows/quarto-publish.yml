name: Render and publish Quarto documents

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # --------------------------------------------------
      # Get the student's repository
      # --------------------------------------------------

      - name: Check out repository
        uses: actions/checkout@v4


      # --------------------------------------------------
      # Install Quarto
      # --------------------------------------------------

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2


      # --------------------------------------------------
      # Install R
      # --------------------------------------------------

      - name: Set up R
        uses: r-lib/actions/setup-r@v2


      # --------------------------------------------------
      # Install R packages used by the practicals
      # --------------------------------------------------

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::gt


      # --------------------------------------------------
      # Create directory for the website
      # --------------------------------------------------

      - name: Create site directory
        run: |
          mkdir -p _site


      # --------------------------------------------------
      # Find and render every QMD file
      # --------------------------------------------------

      - name: Render all Quarto documents
        run: |

          find . -type f -name "*.qmd" \
            -not -path "./.github/*" \
            -print0 | while IFS= read -r -d '' file; do

            # Get the directory containing the QMD
            folder=$(dirname "$file")

            # Remove leading ./
            folder=${folder#./}

            # Get filename without .qmd
            filename=$(basename "$file" .qmd)

            echo ""
            echo "=========================================="
            echo "Rendering: $file"
            echo "=========================================="

            # Create matching output directory
            mkdir -p "_site/$folder"

            # Render from inside the QMD's directory
            (
              cd "$folder"

              quarto render "$filename.qmd" \
                --output-dir "../../_site/$folder"
            )

          done


      # --------------------------------------------------
      # Create a simple homepage
      # --------------------------------------------------

      - name: Create homepage
        run: |

          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>MB1A Practicals 2026-2027</title>
          </head>

          <body>

          <h1>MB1A Practicals</h1>

          <p>Select a practical below:</p>

          <ul>
          EOF


          # Find practical folders containing QMD files
          find . -mindepth 2 -maxdepth 2 -type f -name "*.qmd" \
            -not -path "./.github/*" \
            | sed 's|^\./||' \
            | cut -d/ -f1 \
            | sort -u \
            | while read folder; do

              echo "<li><a href=\"$folder/index.html\">$folder</a></li>" \
                >> _site/index.html

          done


          cat >> _site/index.html << 'EOF'

          </ul>

          </body>
          </html>
          EOF


      # --------------------------------------------------
      # Upload the rendered website
      # --------------------------------------------------

      - name: Upload rendered site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site


      # --------------------------------------------------
      # Deploy to GitHub Pages
      # --------------------------------------------------

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4