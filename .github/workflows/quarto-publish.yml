name: Render and publish Quarto documents

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # -----------------------------------------
      # Check out repository
      # -----------------------------------------

      - name: Check out repository
        uses: actions/checkout@v4


      # -----------------------------------------
      # Set up Quarto
      # -----------------------------------------

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2


      # -----------------------------------------
      # Set up R
      # -----------------------------------------

      - name: Set up R
        uses: r-lib/actions/setup-r@v2


      # -----------------------------------------
      # Install R packages
      # -----------------------------------------

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::gt


      # -----------------------------------------
      # Render all Quarto documents
      # -----------------------------------------

      - name: Render all Quarto documents
        run: |

          find . -type f -name "*.qmd" \
            -not -path "./.github/*" \
            -print0 | while IFS= read -r -d '' file; do

            folder=$(dirname "$file")
            filename=$(basename "$file")

            echo ""
            echo "=========================================="
            echo "Rendering: $file"
            echo "=========================================="

            (
              cd "$folder"
              quarto render "$filename"
            )

          done


      # -----------------------------------------
      # Create publishing directory
      # -----------------------------------------

      - name: Create publishing directory
        run: |
          mkdir -p public


      # -----------------------------------------
      # Copy practical folders
      # -----------------------------------------

      - name: Copy practical folders
        run: |

          for folder in Practical_*/; do

            if [ -d "$folder" ]; then

              echo "Copying $folder"

              cp -r "$folder" "public/$folder"

            fi

          done


      # -----------------------------------------
      # Add links to QMD pages
      # -----------------------------------------

      - name: Create practical navigation pages
        run: |

          for folder in Practical_*/; do

            if [ -d "$folder" ]; then

              folder_name="${folder%/}"

              echo "Creating navigation for $folder_name"

              # Create temporary navigation HTML
              cat > /tmp/navigation.html << EOF

          <section>

          <h2>Documents</h2>

          <ul>

          EOF


              # Find all QMD files except index.qmd
              find "$folder" -maxdepth 1 -type f -name "*.qmd" \
                ! -name "index.qmd" \
                -print | sort | while read file; do

                filename=$(basename "$file" .qmd)

                # Get title from YAML
                title=$(grep -m 1 '^title:' "$file" \
                  | sed 's/^title:[[:space:]]*//' \
                  | sed 's/^"//' \
                  | sed 's/"$//')

                # If no title is found, use filename
                if [ -z "$title" ]; then
                  title=$(echo "$filename" | sed 's/_/ /g')
                fi

                echo "<li><a href=\"$filename.html\">$title</a></li>" \
                  >> /tmp/navigation.html

              done


              cat >> /tmp/navigation.html << EOF

          </ul>

          </section>

          EOF


              # Insert navigation before </body>
              if [ -f "public/$folder_name/index.html" ]; then

                sed -i \
                  -e "/<\/body>/e cat /tmp/navigation.html" \
                  "public/$folder_name/index.html"

              fi

            fi

          done


      # -----------------------------------------
      # Create main Quarto homepage
      # -----------------------------------------

      - name: Create main homepage
        run: |

          cat > homepage.qmd << 'EOF'
          ---
          title: "MB1A Practicals"
          format:
            html:
              theme: flatly
          ---

          Select a practical below:

          ## Practicals

          EOF


          for folder in Practical_*/; do

            folder_name="${folder%/}"

            if [ -f "public/$folder_name/index.html" ]; then

              echo "- [$folder_name]($folder_name/index.html)" \
                >> homepage.qmd

            fi

          done


          quarto render homepage.qmd \
            --output public/index.html


      # -----------------------------------------
      # Upload website to GitHub Pages
      # -----------------------------------------

      - name: Upload rendered site
        uses: actions/upload-pages-artifact@v3
        with:
          path: public


      # -----------------------------------------
      # Deploy website
      # -----------------------------------------

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4